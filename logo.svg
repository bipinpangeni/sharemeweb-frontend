<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d6ef6"/>
      <stop offset="100%" stop-color="#5b8ff9"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#iconGrad)"/>

  <!-- Upload arrow -->
  <polyline points="50,78 50,36" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <polyline points="32,54 50,34 68,54" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="28" y="80" width="44" height="7" rx="3.5" fill="white" opacity="0.9"/>

  <!-- Share dots -->
  <circle cx="88" cy="12" r="8" fill="white" opacity="0.95"/>
  <circle cx="100" cy="12" r="4" fill="white" opacity="0.5"/>

  <!-- Brand name -->
  <text font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="-1">
    <tspan x="116" y="68" fill="#1a1916">Share</tspan><tspan fill="#2d6ef6">Me</tspan><tspan fill="#1a1916">Web</tspan>
  </text>

  <!-- Tagline -->
  <text x="116" y="90" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#7a7670" letter-spacing="0.2">Free · Instant · Private File Sharing</text>
</svg>
